<link rel="stylesheet" href="style.css">

<body>

        <button id="prevBtn" onclick="prevSection()">戻る</button>
        <button id="nextBtn" onclick="nextSection()">次へ</button>
    </div>

</div>

            answer:"条件エンハンス"
        },
        {

            choices:["クエスト終了時","攻撃時","クエストスタート時","スキル発動時"],

},

{

    questions:[
        {
            id:"q11",

        {

        {

        },
        {

        },
        {
            id:"q15",

            answer:"6"
        }
    ]
},

{
    title:"第4問　中級知識問題",

        {

            text:"同時消し係数の計算の式として正しいもの（スキルは何も使っていない状態）",
            choices:[
                "カードのこうげき値×各種補正×{1+(同時に消したぷよの数-4)×0.15}",

                "カードのこうげき値×各種補正×{1+(同時に消したぷよの数-4)×0.24}",

        },
        {
            id:"q18",
            text:"現在のデッキのコスト上限は幾つに設定されているか",
            choices:["760","700","648","684"],
            answer:"760"
        },
        {
            id:"q19",
            text:"特訓機能が追加されたのはいつか",
            choices:["2017年8月","2018年2月","2018年4月","2017年6月"],
            answer:"2017年8月"
        },
        {
            id:"q20",
            text:"副属性の攻撃力は通常攻撃の約何分の１倍か",
            choices:["2","3","4","5"],
            answer:"3"
        }
    ]
},

{
    title:"第5問　中級よりちょいむずい知識問題",
    questions:[
        {
            id:"q21",
            text:"一番最初に魔導石ガチャから排出された初代ぷよシリーズはどれ？",
            choices:["アルル","ドラコ","ウィッチ","シェゾ"],
            answer:"シェゾ"
        },
        {
            id:"q22",
            text:"ぷよクエ最初のギルドイベントの名称は？",
            choices:["神殿ラッシュ","魔獣ラッシュ","SUNラッシュ","クリスマスラッシュ"],

        {

    ]
},

{
    title:"第6問　計算問題",
    questions:[
        {
            id:"q26",

            choices:["100","120","200","220"],
            answer:"100"
        },
        {
            id:"q27",
            text:"7800円と4800円の有償石のみのパックをアプリから買った場合いくつになるか",
            choices:["105","100","110","98"],
            answer:"105"
        },
        {
            id:"q28",
            text:"ブーストエリアで55個消えた場合、倍率は何％か",
            choices:["200","220","180","165"],
            answer:"200"
        },
        {
            id:"q29",
            text:"灰色のレムレスと異邦ローザッテのアビリティの倍率をかけるといくつになるか",
            choices:["36","49","64","42"],
            answer:"49"
        },
        {
            id:"q30",
            text:"キッチンシリーズのノーマルスキルとニャンコのりんごのスキル必要数を足した数字はいくつか(スキル０）",
            choices:["50","40","45","60"],
            answer:"50"
        }
    ]
}

];

let currentSection = 0;

function saveAnswer(questionId, answer){
    localStorage.setItem(questionId, answer);
}

function shuffleArray(array){
    const copied = [...array];

    for(let i = copied.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
    }

    return copied;
}

function getShuffledChoices(q){
    const key = "shuffle_" + q.id;
    const saved = localStorage.getItem(key);

    if(saved){
        try{
            const parsed = JSON.parse(saved);

            const isValid =
                parsed.length === q.choices.length &&
                parsed.every(choice => q.choices.includes(choice));

            if(isValid){
                return parsed;
            }
        }catch(e){
            localStorage.removeItem(key);
        }
    }

    const shuffled = shuffleArray(q.choices);
    localStorage.setItem(key, JSON.stringify(shuffled));

    return shuffled;
}

function renderSection(){

    const section = sections[currentSection];

    document.getElementById("progressText").innerText =
        `進捗：第${currentSection + 1}問 / 第${sections.length}問`;

    document.getElementById("progressFill").style.width =
        `${((currentSection + 1) / sections.length) * 100}%`;

    document.getElementById("sectionTitle").innerText =
        section.title;

    let html = "";

    section.questions.forEach((q,index)=>{

        html += `
        <div class="info">
            <strong>問${index + 1}</strong>
            <p>${q.text}</p>
        `;

        const shuffledChoices = getShuffledChoices(q);

        shuffledChoices.forEach((choice,choiceIndex)=>{

            const checked =
                localStorage.getItem(q.id) === choice
                ? "checked"
                : "";

            html += `
            <label class="choiceLabel">
                <input
                    type="radio"
                    name="${q.id}"
                    value="${choice}"
                    ${checked}
                >
                ${["①","②","③","④","⑤"][choiceIndex]}
                ${choice}
            </label>
            `;

        });

        html += `</div>`;

    });

    document.getElementById("questionArea").innerHTML = html;

    document.querySelectorAll('input[type="radio"]').forEach(input => {
        input.addEventListener("change", function(){
            saveAnswer(this.name, this.value);
        });
    });

    document.getElementById("prevBtn").style.display =
        currentSection === 0 ? "none" : "block";

    document.getElementById("nextBtn").innerText =
        currentSection === sections.length - 1
        ? "結果へ"
        : "次へ";
}

function nextSection(){

    if(currentSection < sections.length - 1){

        currentSection++;
        renderSection();

        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });

    }else{

        const unanswered = [];

        sections.forEach(section => {

            section.questions.forEach(q => {

                if(localStorage.getItem(q.id) === null){
                    unanswered.push(q.id);
                }

            });

        });

        if(unanswered.length > 0){

            const go = confirm(
                `未回答の問題が ${unanswered.length} 問あります。\n\n提出しますか？`
            );

            if(!go){
                return;
            }

        }

        localStorage.setItem("puyoSections", JSON.stringify(sections));

        window.location.href = "result.html";

    }
}

function prevSection(){

    if(currentSection > 0){

        currentSection--;
        renderSection();

        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });

    }
}

renderSection();

</script>

</body>
</html>
